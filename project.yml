name: KDWarm
options:
  bundleIdPrefix: com.kdwarm
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    ARCHS: "arm64 x86_64"
    ONLY_ACTIVE_ARCH: "YES"
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    # Local builds sign ad-hoc; real Developer ID + notarization arrives in Phase 9.
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "YES"
    DEVELOPMENT_TEAM: ""

targets:
  # Shared framework: design tokens + models + the XPC contract, linked by the app
  # (and, from Phase 4, the privileged helper) so model types stay single-sourced.
  KDWarmKit:
    type: framework
    platform: macOS
    sources:
      - path: KDWarmKit/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.kit
        DEFINES_MODULE: "YES"
        SKIP_INSTALL: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"

  # Menu-bar accessory app (no Dock icon at idle). UI only — logic lives in KDWarmKit.
  KDWarm:
    type: application
    platform: macOS
    sources:
      - path: KDWarm
    dependencies:
      - target: KDWarmKit
        embed: true
      # Build-order + copy only (no linking); lands in Contents/MacOS so Phase 4's
      # SMAppService daemon plist can reference it. Empty stub for now.
      - target: KDWarmHelper
        link: false
        copy:
          destination: executables
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.app
        INFOPLIST_FILE: KDWarm/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_ENTITLEMENTS: KDWarm/KDWarm.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: "YES"
        COMBINE_HIDPI_IMAGES: "YES"
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  # Privileged-helper stub. Idle now; wired as an SMAppService daemon in Phase 4.
  KDWarmHelper:
    type: tool
    platform: macOS
    sources:
      - path: KDWarmHelper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kdwarm.helper
        CODE_SIGN_ENTITLEMENTS: KDWarmHelper/KDWarmHelper.entitlements
        ENABLE_HARDENED_RUNTIME: "YES"

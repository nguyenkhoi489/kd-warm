# S1 reference — the ONLY correct privileged-port listen form for KDWarm vhosts.
#
# Proven by bind-reality-test.swift: a non-root user can bind 0.0.0.0:80 / 0.0.0.0:443,
# but 127.0.0.1:80 returns EACCES. Therefore every generated vhost MUST listen on
# 0.0.0.0 (all interfaces) and MUST NEVER emit a loopback privileged listen.
#
# Reachability via 127.0.0.1 is unaffected: a socket bound to 0.0.0.0 also accepts
# connections arriving on the loopback address.
#
# This file is a Phase-2 template reference; nginx is not staged in this spike phase.

events {}

http {
    server {
        listen 0.0.0.0:80;          # OK as non-root
        # listen 127.0.0.1:80;      # WRONG — EACCES as non-root; never generate this
        server_name demo.test;
        return 200 "KDWarm S1 ok\n";
    }

    server {
        listen 0.0.0.0:443 ssl;     # OK as non-root; TLS cert wired in Phase 5
        server_name demo.test;
        # ssl_certificate / ssl_certificate_key supplied per-site by the mkcert flow (S4 / Phase 5)
        return 200 "KDWarm S1 ssl ok\n";
    }
}
